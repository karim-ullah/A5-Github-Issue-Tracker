<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Github Issue Tracker</title>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind & Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
  </head>
  <body>

    <section class="h-screen bg-[#F8FAFC] flex justify-center items-center">

      <div class="bg-white w-lg mx-auto text-center p-8 rounded-xl">
        <img src="./assets/github-logo.png" alt="" class="mx-auto pb-6" />
        <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
        <p class="pb-6">Sign in to manage your issues</p>

        <fieldset class="fieldset">

          <label class="label font-medium text-xl text-black">Username</label>
          <input type="text" class="input w-full py-4 rounded-lg" placeholder="Enter Username" id="username" />

          <label class="label font-medium text-xl text-black">Password</label>
          <input type="password" class="input w-full py-4 rounded-lg" placeholder="Enter Password" id="password" />

          <button onclick="loginSuccess()" class="btn btn-primary mt-4 rounded-s-lg">Sign In</button>

        </fieldset>



          <div class="demo-password">
            <div class="flex items-center gap-4 my-6">
              <hr class="flex-grow border-gray-300">
              <span class="text-gray-500 text-sm">OR</span>
              <hr class="flex-grow border-gray-300">
            </div>
            <p>Demo Credentials:</p>
            <div class="bg-[#F8FAFC] p-5 rounded-2xl mt-6">
              <p><span class="font-semibold">Username:</span> admin</p>
              <p><span class="font-semibold">Password:</span> admin123</p>
            </div>
          </div>

      </div>


      

    </section>
    <!-- scripts -->
     <script src="./scripts/login.js"></script>
  </body>
</html>
